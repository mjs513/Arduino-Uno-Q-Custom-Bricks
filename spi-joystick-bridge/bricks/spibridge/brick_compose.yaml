# Source: https://forum.arduino.cc/t/getting-a-neato-xv-11-lidar-working-on-the-q/1445568/18
services:
  spi3bridge:
    # App Lab will automatically look for the Dockerfile in the same folder
    image: mjs513/spibridge-spi3bridge
    # Map the UNO Q SPI hardware line into the container
    devices:
      - "/dev/spidev0.0:/dev/spidev0.0"
    ports:
      # Expose the port for communication with the container's Flask web application.
      # See: https://docs.docker.com/reference/compose-file/services/#ports
      - "5000:5000"

  joystickbridge:
    image: mjs513/joystickbridge_autodetect 
    privileged: true
    # --- ADDED FOR BLUETOOTH SUPPORT ---
    #network_mode: "host"
    volumes:
      - /var/run/dbus:/var/run/dbus
      - /dev/input:/dev/input:ro  # Mounts input directory dynamically as Read-Only
    # -----------------------------------
    
    group_add:
      - "995"
    devices:
      #- "/dev/input:/dev/input"
      - "/usr/sbin/rfkill:/usr/sbin/rfkill" # Added to support 'rfkill unblock bluetooth' inside the script
      
    ports:
      # Expose the port for communication with the container's Flask web application.
      # See: https://docs.docker.com/reference/compose-file/services/#ports
      - "5001:5000"